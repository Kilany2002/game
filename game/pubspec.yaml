name: game
description: "بلف - لعبة تريفيا بلف عربية ممتعة للجميع"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.4.0

  # Navigation
  go_router: ^14.6.3

  # Code Generation — annotations only at runtime
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # UI & Fonts
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Code Generation — build-time tools
  build_runner: ^2.4.12
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.4

flutter:
  uses-material-design: true
